version: "3.9"

services:
  deepvoice:
    build: .
    container_name: deepvoice-app
    ports:
      - "8443:8443"
    volumes:
      # Mount data directory (read-only)
      - ./KAGGLE:/app/KAGGLE:ro
      # Mount cache directory (writable) to persist model results
      - ./web/cache:/app/web/cache
      # Mount web source for live editing (dev convenience)
      - ./web/static:/app/web/static:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/"]
      interval: 30s
      timeout: 10s
      retries: 3
