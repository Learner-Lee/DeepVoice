<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeepVoice - AI 声音识别教学平台</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">🎙️</div>
    <div>
      <div class="sidebar-title">DeepVoice</div>
      <div class="sidebar-subtitle" data-i18n="subtitle">AI 声音识别教学平台</div>
    </div>
  </div>

  <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开">◀</button>

  <nav>
    <div class="nav-section" data-i18n="nav_section_nav">导航</div>

    <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">📊</span>
      <span class="nav-label" data-i18n="nav_dashboard">数据总览 Dashboard</span>
    </div>

    <div class="nav-section">SpecRNet</div>

    <div class="nav-item" data-page="specrnet" onclick="navigate('specrnet')">
      <span class="nav-icon">🔊</span>
      <span class="nav-label" data-i18n="nav_specrnet">SpecRNet 深度模型</span>
    </div>

    <div class="nav-section" data-i18n="nav_section_ml">机器学习模型</div>

    <div class="nav-item" data-page="model-logistic_regression" onclick="navigate('model-logistic_regression')">
      <span class="nav-icon">📈</span>
      <span class="nav-label" data-i18n="nav_lr">逻辑回归</span>
    </div>
    <div class="nav-item" data-page="model-random_forest" onclick="navigate('model-random_forest')">
      <span class="nav-icon">🌲</span>
      <span class="nav-label" data-i18n="nav_rf">随机森林</span>
    </div>
    <div class="nav-item" data-page="model-svm" onclick="navigate('model-svm')">
      <span class="nav-icon">🔷</span>
      <span class="nav-label" data-i18n="nav_svm">支持向量机 SVM</span>
    </div>
    <div class="nav-item" data-page="model-xgboost" onclick="navigate('model-xgboost')">
      <span class="nav-icon">⚡</span>
      <span class="nav-label" data-i18n="nav_xgb">XGBoost</span>
    </div>
    <div class="nav-item" data-page="model-knn" onclick="navigate('model-knn')">
      <span class="nav-icon">📍</span>
      <span class="nav-label" data-i18n="nav_knn">K近邻 KNN</span>
    </div>
    <div class="nav-item" data-page="model-mlp" onclick="navigate('model-mlp')">
      <span class="nav-icon">🧠</span>
      <span class="nav-label" data-i18n="nav_mlp">神经网络 MLP</span>
    </div>

    <div class="nav-section" data-i18n="nav_section_results">结果分析</div>

    <div class="nav-item" data-page="summary" onclick="navigate('summary')">
      <span class="nav-icon">📋</span>
      <span class="nav-label" data-i18n="nav_summary">模型总结 Summary</span>
    </div>

    <div class="nav-item" data-page="test" onclick="navigate('test')">
      <span class="nav-icon">🔬</span>
      <span class="nav-label" data-i18n="nav_test">测试模型</span>
    </div>
  </nav>

</aside>

<!-- ── Main ──────────────────────────────────────────────────────── -->
<div id="main">
  <div id="topbar">
    <div class="topbar-left">
      <div class="page-title" id="page-title">📊 数据总览 Dashboard</div>
    </div>

    <!-- Apple-style segmented language control (flex center column) -->
    <div class="lang-segmented" id="lang-segmented">
      <button class="lang-seg active" id="seg-zh" onclick="setLang('zh')">中文</button>
      <button class="lang-seg" id="seg-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="topbar-right">
      <div class="topbar-badge">DeepVoice v1.0</div>
      <div class="topbar-badge" data-i18n="topbar_badge">教学演示平台</div>
    </div>
  </div>
  <div id="content">
    <div style="display:flex;align-items:center;justify-content:center;height:200px;">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- ── Scripts ───────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
